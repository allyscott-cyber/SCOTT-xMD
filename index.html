<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLY SCOTT - WA Pairing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --neon-glow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), var(--neon-glow);
            text-align: center;
            width: 90%;
            max-width: 420px;
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: var(--primary);
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            font-family: 'Orbitron', sans-serif;
        }

        button:hover {
            background-color: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }

        #result-container {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background-color: #0c1221;
            border: 1px dashed var(--secondary);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        #pairing-code {
            font-size: 32px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: var(--secondary);
            letter-spacing: 8px;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .copy-btn {
            background-color: #334155;
            color: white;
            font-size: 14px;
            padding: 8px 15px;
            width: auto;
            margin-top: 10px;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
            border: none;
            cursor: pointer;
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .loading {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ALLY SCOTT</h1>
    <p>Alien System V11 👽</p>
    
    <div class="input-group">
        <input type="text" id="number" placeholder="2557XXXXXXXX" />
    </div>
    
    <button onclick="getCode()" id="main-btn">Pata Code Sasa</button>
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <span style="color: #fbbf24;">Inatengeneza code yako...</span>
    </div>

    <div id="result-container">
        <p style="margin: 0; color: #94a3b8; font-weight: bold;">KODI YAKO:</p>
        <div id="pairing-code">------</div>
        <button class="copy-btn" onclick="copyCode()" id="btn-copy">Bofya hapa ku-copy</button>
        <p style="font-size: 13px; margin-top: 15px; color: #64748b;">Nenda WhatsApp > Linked Devices > Link with phone number kisha paste code hiyo.</p>
    </div>
</div>

<script>
    async function getCode() {
        const numInput = document.getElementById('number');
        const num = numInput.value.replace(/[^0-9]/g, '');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('result-container');
        const codeDiv = document.getElementById('pairing-code');
        const mainBtn = document.getElementById('main-btn');

        if (!num || num.length < 10) {
            alert("⚠️ Tafadhali weka namba ya simu iliyokamilika (Mfano: 255...)!");
            return;
        }

        mainBtn.disabled = true;
        mainBtn.style.opacity = "0.5";
        loading.style.display = 'block';
        resultContainer.style.display = 'none';

        try {
            // Tumeongeza delay ya 5s kwenye fetch ili server itulie
            const response = await fetch(`/api/get-code?number=${num}`);
            const data = await response.json();

            loading.style.display = 'none';
            mainBtn.disabled = false;
            mainBtn.style.opacity = "1";

            if (data.code) {
                resultContainer.style.display = 'block';
                codeDiv.innerText = data.code;
                // Auto-copy kwa urahisi
                navigator.clipboard.writeText(data.code);
            } else if (data.error) {
                alert("❌ Error: " + data.error);
            }
        } catch (err) {
            loading.style.display = 'none';
            mainBtn.disabled = false;
            mainBtn.style.opacity = "1";
            alert("⚠️ Server Busy! Jaribu tena baada ya sekunde chache.");
        }
    }

    function copyCode() {
        const code = document.getElementById('pairing-code').innerText;
        const copyBtn = document.getElementById('btn-copy');

        if (code === "------") return;

        navigator.clipboard.writeText(code).then(() => {
            copyBtn.innerText = "✅ IMEKOPYIWA!";
            copyBtn.style.backgroundColor = "#10b981";
            
            setTimeout(() => {
                copyBtn.innerText = "Bofya hapa ku-copy";
                copyBtn.style.backgroundColor = "#334155";
            }, 2000);
        }).catch(err => {
            alert("Imeshindwa ku-copy, jaribu ku-copy manual.");
        });
    }
</script>

</body>
</html>
